name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | awk '/Schemes:/{flag=1;next} flag{print;exit}' | xargs)
          
          # アーカイブを直下に作成
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ./MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA (The Final Strategy)
        run: |
          mkdir -p Payload
          
          # 【重要】パスを決め打ちせず、アーカイブ内から .app フォルダを全探索してコピー
          # これにより、内部構造がどうあれ実体を確実にキャッチします
          find ./MyLLM.xcarchive -name "*.app" -type d -exec cp -r {} ./Payload/ \;
          
          # 内容物の確認（ここでファイルサイズが表示されれば勝ちです）
          du -sh ./Payload/*
          
          # IPAとしてパッキング
          zip -r MyLLM.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
