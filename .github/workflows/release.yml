name: Release Workflow (Perfect Offline)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      # 👻 画面(JS)側だけを騙すメモリモック（UIのエラー回避用）
      - name: '👻 Step 1: Mock Keychain & Firebase JS'
        run: |
          # Keychainのモック化
          node -e "
            const fs = require('fs'); const path = require('path');
            const pkgDir = path.join('node_modules', 'react-native-keychain');
            if (fs.existsSync(pkgDir)) {
              const mockCode = \`
                const mock = {
                  setGenericPassword: () => Promise.resolve(true),
                  getGenericPassword: () => Promise.resolve(false),
                  resetGenericPassword: () => Promise.resolve(true),
                  setInternetPassword: () => Promise.resolve(true),
                  getInternetPassword: () => Promise.resolve(false),
                  resetInternetPassword: () => Promise.resolve(true),
                  getAllGenericPasswordServices: () => Promise.resolve([]),
                  hasInternetCredentials: () => Promise.resolve(false),
                  requestSharedWebCredentials: () => Promise.resolve(false),
                  setSharedWebCredentials: () => Promise.resolve(),
                  getSecurityLevel: () => Promise.resolve('SECURE_HARDWARE'),
                  getSupportedBiometryType: () => Promise.resolve(null),
                  canImplyAuthentication: () => Promise.resolve(false),
                  ACCESS_CONTROL: {}, ACCESSIBLE: {}, AUTHENTICATION_TYPE: {}, BIOMETRY_TYPE: {}, SECURITY_LEVEL: {}, SECURITY_RULES: {}, STORAGE_TYPE: {},
                };
                module.exports = mock; module.exports.default = mock;
              \`;
              fs.writeFileSync(path.join(pkgDir, 'index.js'), mockCode);
            }
          "
          # Firebaseのモック化
          node -e "
            const fs = require('fs'); const path = require('path');
            const modules = ['app', 'analytics', 'crashlytics'];
            modules.forEach(mod => {
              const modDir = path.join('node_modules', '@react-native-firebase', mod);
              if (fs.existsSync(modDir)) {
                const libDir = path.join(modDir, 'lib');
                if (!fs.existsSync(libDir)) fs.mkdirSync(libDir, { recursive: true });
                fs.writeFileSync(path.join(libDir, 'index.js'), 'module.exports = { default: () => ({}) };');
              }
            });
          "

      # 🧹 不要なPodを排除した状態でインストール
      - name: Install iOS Pods
        run: |
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      # 📁 ファイルアプリからGGUFモデルを読み込めるようにする設定（超重要）
      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "❌ Error: Payload is too small ($SIZE_KB KB)."
            exit 1
          fi
          zip -r MyLLM.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa