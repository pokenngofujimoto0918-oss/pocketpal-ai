name: Release Workflow (Auto-link Disable v3 - Correct Order)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      - name: Disable Auto-linking BEFORE pod install
        run: |
          node -e "
            const fs = require('fs');

            let existing = {};
            if (fs.existsSync('react-native.config.js')) {
              const raw = fs.readFileSync('react-native.config.js', 'utf8')
                .replace(/^\s*module\.exports\s*=\s*/, '')
                .replace(/;?\s*$/, '');
              try { existing = eval('(' + raw + ')'); } catch(e) {}
            }

            existing.dependencies = existing.dependencies || {};
            existing.dependencies['react-native-keychain'] = {
              platforms: { ios: null, android: null }
            };

            fs.writeFileSync(
              'react-native.config.js',
              'module.exports = ' + JSON.stringify(existing, null, 2) + ';\n'
            );
            console.log('react-native.config.js updated (before pod install)');
            console.log(fs.readFileSync('react-native.config.js', 'utf8'));
          "

      - name: Install iOS Pods
        run: |
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      - name: JS Mock - Replace react-native-keychain with memory mock
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgDir = path.join('node_modules', 'react-native-keychain');

            if (!fs.existsSync(pkgDir)) {
              console.log('react-native-keychain not found. Skipping.');
              process.exit(0);
            }

            const mockContent = [
              \"'use strict';\",
              'const _store = {};',
              'const mock = {',
              '  setGenericPassword: (user, pass, opts) => {',
              \"    const key = (opts && opts.service) || 'default';\",
              '    _store[key] = { username: user, password: pass };',
              '    return Promise.resolve(true);',
              '  },',
              '  getGenericPassword: (opts) => {',
              \"    const key = (opts && opts.service) || 'default';\",
              '    return Promise.resolve(_store[key] || false);',
              '  },',
              '  resetGenericPassword: (opts) => {',
              \"    const key = (opts && opts.service) || 'default';\",
              '    delete _store[key];',
              '    return Promise.resolve(true);',
              '  },',
              '  setInternetPassword: (server, user, pass) => {',
              '    _store[server] = { username: user, password: pass };',
              '    return Promise.resolve(true);',
              '  },',
              '  getInternetPassword: (server) => Promise.resolve(_store[server] || false),',
              '  resetInternetPassword: (server) => { delete _store[server]; return Promise.resolve(true); },',
              '  getAllGenericPasswordServices: () => Promise.resolve([]),',
              '  hasInternetCredentials: (server) => Promise.resolve(!!_store[server]),',
              '  requestSharedWebCredentials: () => Promise.resolve(false),',
              '  setSharedWebCredentials: () => Promise.resolve(),',
              \"  getSecurityLevel: () => Promise.resolve('SECURE_HARDWARE'),\",
              '  getSupportedBiometryType: () => Promise.resolve(null),',
              '  canImplyAuthentication: () => Promise.resolve(false),',
              '  ACCESS_CONTROL: {},',
              '  ACCESSIBLE: {},',
              '  AUTHENTICATION_TYPE: {},',
              '  BIOMETRY_TYPE: {},',
              '  SECURITY_LEVEL: {},',
              '  SECURITY_RULES: {},',
              '  STORAGE_TYPE: {},',
              '};',
              'module.exports = mock;',
              'module.exports.default = mock;',
            ].join('\n');

            fs.writeFileSync(path.join(pkgDir, 'index.js'), mockContent);

            ['lib', 'src', 'commonjs', 'dist'].forEach(sub => {
              const subDir = path.join(pkgDir, sub);
              if (fs.existsSync(subDir)) {
                ['index.js', 'index.native.js'].forEach(f => {
                  const fp = path.join(subDir, f);
                  if (fs.existsSync(fp)) {
                    fs.writeFileSync(fp, \"module.exports = require('../index.js');\n\");
                  }
                });
              }
            });

            console.log('react-native-keychain JS replaced with memory mock.');
          "

      - name: Create Perfect Dummy GoogleService-Info.plist
        run: |
          cat << 'EOF' > ios/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key><string>dummy.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.dummy</string>
            <key>API_KEY</key><string>dummy_api_key_1234567890</string>
            <key>GCM_SENDER_ID</key><string>1234567890</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>ai.pocketpal.VCFA343Q28</string>
            <key>PROJECT_ID</key><string>dummy-project</string>
            <key>STORAGE_BUCKET</key><string>dummy-project.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>1:1234567890:ios:abcdef123456</string>
          </dict>
          </plist>
          EOF

      - name: Create missing config files
        run: |
          mkdir -p ios/Config
          echo "// Dummy config" > ios/Config/Env.xcconfig

      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" \
            || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" \
            || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      - name: Pre-build Sanity Check
        run: |
          echo "=== react-native.config.js ==="
          cat react-native.config.js

          echo ""
          echo "=== Podfile.lock: RNKeychain should NOT be present ==="
          if grep -q "RNKeychain" ios/Podfile.lock 2>/dev/null; then
            echo "WARNING: RNKeychain is still in Podfile.lock!"
            grep "RNKeychain" ios/Podfile.lock
          else
            echo "OK: RNKeychain is NOT in Podfile.lock. Auto-linking successfully disabled."
          fi

          echo ""
          echo "=== JS mock check ==="
          if grep -q "memory mock\|_store" node_modules/react-native-keychain/index.js 2>/dev/null; then
            echo "OK: JS memory mock is in place."
          else
            echo "WARNING: JS mock may not be applied correctly."
          fi

          echo ""
          echo "=== Native header existence check ==="
          ls node_modules/react-native-keychain/ios/RNKeychainManager/RNKeychainManager.h 2>/dev/null \
            && echo "OK: Native header exists (safe)." \
            || echo "WARNING: Native header missing."

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;

          cp ios/GoogleService-Info.plist Payload/*.app/ || true

          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "Error: Payload is too small (${SIZE_KB} KB). Build likely failed silently."
            exit 1
          fi

          zip -r MyLLM.ipa Payload
          echo "IPA created successfully (${SIZE_KB} KB)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
