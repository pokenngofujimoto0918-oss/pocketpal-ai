name: Release Workflow (Keychain Bypass Edition)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      # ✅ pod installは改変前に実行（本物の依存関係でPodを解決させる）
      - name: Install iOS Pods
        run: |
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      # ---------------------------------------------------------------
      # 🗡️ THE KEYCHAIN BYPASS
      # 無料Apple IDではKeychainエンタイトルメントが剥奪されるため、
      # react-native-keychain をメモリ内AsyncStorageに完全すり替え。
      # OSレベルのSIGABRTを根本から回避する。
      # ---------------------------------------------------------------
      - name: 🗡️ The Keychain Bypass (Replace RNKeychain with Memory Mock)
        run: |
          echo "🔑 Step 1: Neutering react-native-keychain NPM package..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            const pkgDir = path.join('node_modules', 'react-native-keychain');

            if (!fs.existsSync(pkgDir)) {
              console.log('⚠️  react-native-keychain not found in node_modules. Skipping.');
              process.exit(0);
            }

            // -------------------------------------------------------
            // メモリベースのKeychainモック
            // - すべてのAPIをPromiseで返す（RN側の非同期呼び出しに対応）
            // - thenプロパティのundefined化でPromise誤認を防止
            // - 値はアプリセッション中のみメモリで保持（Keychainに触れない）
            // -------------------------------------------------------
            const mockContent = \`
          'use strict';
          const _store = {};

          const mock = {
            setGenericPassword: (user, pass, opts) => {
              const key = (opts && opts.service) || 'default';
              _store[key] = { username: user, password: pass };
              return Promise.resolve(true);
            },
            getGenericPassword: (opts) => {
              const key = (opts && opts.service) || 'default';
              return Promise.resolve(_store[key] || false);
            },
            resetGenericPassword: (opts) => {
              const key = (opts && opts.service) || 'default';
              delete _store[key];
              return Promise.resolve(true);
            },
            setInternetPassword: (server, user, pass) => {
              _store[server] = { username: user, password: pass };
              return Promise.resolve(true);
            },
            getInternetPassword: (server) => {
              return Promise.resolve(_store[server] || false);
            },
            resetInternetPassword: (server) => {
              delete _store[server];
              return Promise.resolve(true);
            },
            getAllGenericPasswordServices: () => Promise.resolve([]),
            hasInternetCredentials: (server) => Promise.resolve(!!_store[server]),
            requestSharedWebCredentials: () => Promise.resolve(false),
            setSharedWebCredentials: () => Promise.resolve(),
            getSecurityLevel: () => Promise.resolve('SECURE_HARDWARE'),
            getSupportedBiometryType: () => Promise.resolve(null),
            canImplyAuthentication: () => Promise.resolve(false),
            ACCESS_CONTROL: {},
            ACCESSIBLE: {},
            AUTHENTICATION_TYPE: {},
            BIOMETRY_TYPE: {},
            SECURITY_LEVEL: {},
            SECURITY_RULES: {},
            STORAGE_TYPE: {},
          };

          module.exports = mock;
          module.exports.default = mock;
          \`;

            // node_modules内を完全消去してモックに置換
            const files = fs.readdirSync(pkgDir);
            files.forEach(f => {
              const full = path.join(pkgDir, f);
              try {
                if (fs.statSync(full).isDirectory()) {
                  fs.rmSync(full, { recursive: true, force: true });
                } else {
                  fs.unlinkSync(full);
                }
              } catch(e) {}
            });

            // ルートのダミーファイルを配置
            fs.writeFileSync(path.join(pkgDir, 'index.js'), mockContent);
            fs.writeFileSync(path.join(pkgDir, 'package.json'), JSON.stringify({
              name: 'react-native-keychain',
              version: '99.0.0',
              main: 'index.js',
              'react-native': 'index.js',
            }, null, 2));

            // Metroが引っ張りに来るサブパスも全て潰す
            ['lib', 'src', 'commonjs', 'dist'].forEach(sub => {
              const subDir = path.join(pkgDir, sub);
              fs.mkdirSync(subDir, { recursive: true });
              fs.writeFileSync(path.join(subDir, 'index.js'), \`module.exports = require('../index.js');\`);
              fs.writeFileSync(path.join(subDir, 'index.native.js'), \`module.exports = require('../index.js');\`);
            });

            console.log('✅ react-native-keychain replaced with memory mock.');
          "

          # -------------------------------------------------------
          # Step 2: iOS Native側のRNKeychainも無力化
          # Podのソースを直接書き換えてKeychainへのアクセスを消去
          # -------------------------------------------------------
          echo "🔑 Step 2: Patching RNKeychain native Pod source..."
          node -e "
            const fs = require('fs');
            const path = require('path');

            const podSrcDir = path.join('ios', 'Pods', 'RNKeychain');
            if (!fs.existsSync(podSrcDir)) {
              console.log('⚠️  RNKeychain Pod not found. Skipping native patch.');
              process.exit(0);
            }

            function walk(dir) {
              let results = [];
              fs.readdirSync(dir).forEach(f => {
                const full = path.join(dir, f);
                if (fs.statSync(full).isDirectory()) {
                  results = results.concat(walk(full));
                } else if (/\.(m|mm|swift)$/.test(f)) {
                  results.push(full);
                }
              });
              return results;
            }

            walk(podSrcDir).forEach(file => {
              let content = fs.readFileSync(file, 'utf8');
              const original = content;

              // Keychainアクセス関数の呼び出しを無効化
              content = content.replace(/SecItemCopyMatching\s*\(/g, '(void)0; //__BYPASSED__ SecItemCopyMatching(');
              content = content.replace(/SecItemAdd\s*\(/g, '(void)0; //__BYPASSED__ SecItemAdd(');
              content = content.replace(/SecItemUpdate\s*\(/g, '(void)0; //__BYPASSED__ SecItemUpdate(');
              content = content.replace(/SecItemDelete\s*\(/g, '(void)0; //__BYPASSED__ SecItemDelete(');

              if (content !== original) {
                fs.writeFileSync(file, content);
                console.log('✅ Native patched: ' + file);
              }
            });
          "

          echo "🎉 Keychain Bypass Complete!"

      # ---------------------------------------------------------------
      # Firebase対策（Pacifier作戦）：完璧なダミーPlistでFirebaseを騙す
      # ---------------------------------------------------------------
      - name: Create Perfect Dummy GoogleService-Info.plist
        run: |
          cat << 'EOF' > ios/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CLIENT_ID</key><string>dummy.apps.googleusercontent.com</string>
            <key>REVERSED_CLIENT_ID</key><string>com.googleusercontent.apps.dummy</string>
            <key>API_KEY</key><string>dummy_api_key_1234567890</string>
            <key>GCM_SENDER_ID</key><string>1234567890</string>
            <key>PLIST_VERSION</key><string>1</string>
            <key>BUNDLE_ID</key><string>ai.pocketpal.VCFA343Q28</string>
            <key>PROJECT_ID</key><string>dummy-project</string>
            <key>STORAGE_BUCKET</key><string>dummy-project.appspot.com</string>
            <key>IS_ADS_ENABLED</key><false/>
            <key>IS_ANALYTICS_ENABLED</key><false/>
            <key>IS_APPINVITE_ENABLED</key><false/>
            <key>IS_GCM_ENABLED</key><false/>
            <key>IS_SIGNIN_ENABLED</key><false/>
            <key>GOOGLE_APP_ID</key><string>1:1234567890:ios:abcdef123456</string>
          </dict>
          </plist>
          EOF

      - name: Create missing config files
        run: |
          mkdir -p ios/Config
          echo "// Dummy config" > ios/Config/Env.xcconfig

      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" \
            || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" \
            || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      # ---------------------------------------------------------------
      # デバッグ用：クラッシュ候補モジュールの残存チェック
      # ---------------------------------------------------------------
      - name: 🔍 Pre-build Sanity Check
        run: |
          echo "=== Checking for remaining Keychain native calls ==="
          grep -r "SecItemCopyMatching\|SecItemAdd\|SecItemUpdate\|SecItemDelete" \
            ios/Pods/RNKeychain/ --include="*.m" --include="*.mm" --include="*.swift" \
            2>/dev/null && echo "⚠️  WARNING: Keychain calls remain!" || echo "✅ Clean."

          echo "=== Checking react-native-keychain mock ==="
          if grep -q "memory mock" node_modules/react-native-keychain/index.js 2>/dev/null; then
            echo "✅ Keychain mock is in place."
          else
            echo "⚠️  WARNING: Keychain mock may not be applied correctly."
          fi

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;

          # ダミーPlistをアプリバンドル内に強制注入
          cp ios/GoogleService-Info.plist Payload/*.app/ || true

          # サイズチェック（古いIPAの誤配布を防止）
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "❌ Error: Payload is too small (${SIZE_KB} KB). Build likely failed silently."
            exit 1
          fi

          zip -r MyLLM.ipa Payload
          echo "✅ IPA created successfully (${SIZE_KB} KB)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
