name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # 最新の 22系に指定

      - name: Install dependencies (Yarn Strategy)
        run: |
          # npmを完全に無視し、yarnでクリーンインストール
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          # プロジェクト構造に合わせて確実にビルド
          xcodebuild -workspace ios/PocketPalAI.xcworkspace \
            -scheme PocketPalAI \
            -configuration Release \
            -archivePath ios/MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p build/ios
          APP_PATH=$(find ios/MyLLM.xcarchive -name "*.app")
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyLLM.ipa Payload
          mv MyLLM.ipa build/ios/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: build/ios/MyLLM.ipa
