name: Release Workflow (Ultimate Local Mode)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      - name: 🚨 The Firebase Eradicator v3 (Ultimate JS Nuke)
        run: |
          echo "🔥 1. Preventing iOS Native Auto-linking..."
          node -e "
            const fs = require('fs');
            let config = {};
            if (fs.existsSync('react-native.config.js')) {
              try { config = require('./react-native.config.js'); } catch(e) {}
            }
            config.dependencies = config.dependencies || {};
            ['app', 'app-check', 'analytics', 'crashlytics', 'perf'].forEach(mod => {
              config.dependencies[\`@react-native-firebase/\${mod}\`] = { platforms: { ios: null, android: null } };
            });
            fs.writeFileSync('react-native.config.js', 'module.exports = ' + JSON.stringify(config, null, 2) + ';');
          "
          
          echo "🔥 2. iOS Native: Purging Firebase from AppDelegate completely..."
          # AppDelegate.* (swift, mm, m) を探して、Firebase関連の行を物理削除・無効化
          find ios -name "AppDelegate*" -type f | while read file; do
            echo "Patching $file ..."
            sed -i '' '/import RNFBAppCheck/d' "$file" || true
            sed -i '' '/import Firebase/d' "$file" || true
            sed -i '' '/#import <Firebase.h>/d' "$file" || true
            sed -i '' '/#import <RNFBAppCheck\/RNFBAppCheckModule.h>/d' "$file" || true
            sed -i '' 's/RNFBAppCheckModule.sharedInstance()/\/\/ RNFBAppCheckModule.sharedInstance()/g' "$file" || true
            sed -i '' 's/\[FIRApp configure\]/\/\/ \[FIRApp configure\]/g' "$file" || true
            sed -i '' 's/FirebaseApp.configure()/\/\/ FirebaseApp.configure()/g' "$file" || true
          done
          
          echo "🔥 3. JS: Nuke and Replace Firebase NPM packages..."
          # node_modules内のFirebase関連パッケージを中身ごと完全に消し飛ばし、ダミーにすり替える
          if [ -d "node_modules/@react-native-firebase" ]; then
            find node_modules/@react-native-firebase -mindepth 1 -maxdepth 1 -type d | while read pkg_dir; do
              echo "Nuking $pkg_dir"
              rm -rf "$pkg_dir"/*
              echo '{"name":"dummy","version":"99.0.0","main":"index.js"}' > "$pkg_dir/package.json"
              echo 'const m = new Proxy(function(){return m;},{get:function(t,p){if(p==="then")return undefined;if(p==="default")return m;return m;}}); module.exports = m;' > "$pkg_dir/index.js"
            done
          fi

      - name: Install iOS Pods
        run: |
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      - name: Create missing config files
        run: |
          mkdir -p ios/Config
          touch ios/Config/Env.xcconfig
          echo "// Dummy config" > ios/Config/Env.xcconfig
          
          # 【追加】Xcodeのビルドエラーを回避するための「抜け殻plist」
          cat << 'EOF' > ios/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict></dict>
          </plist>
          EOF

      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;
          
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "Error: Payload is too small ($SIZE_KB KB)."
            exit 1
          fi
          zip -r MyLLM.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
