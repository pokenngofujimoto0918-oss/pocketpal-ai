name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | awk '/Schemes:/{flag=1;next} flag{print;exit}' | xargs)
          
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ios/MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p build/ios
          mkdir -p Payload
          
          # アーカイブ内の Products/Applications フォルダから直接 .app をコピーする
          # これが最も確実なパスです
          cp -r ios/MyLLM.xcarchive/Products/Applications/*.app Payload/
          
          # 中身が空でないかサイズを確認
          du -sh Payload/
          
          zip -r MyLLM.ipa Payload
          mv MyLLM.ipa build/ios/
          
          # アーカイブ内の .app フォルダを全探索し、直接 Payload にコピーする
          # ※ -exec cp -r {} を使うことで、変数渡しのミスを物理的に防ぎます
          find ios/MyLLM.xcarchive -name "*.app" -type d -exec cp -r {} Payload/ \;
          
          # 中身が空でないか確認（デバッグ用ログ）
          ls -R Payload
          
          # IPAとして圧縮
          zip -r MyLLM.ipa Payload
          mv MyLLM.ipa build/ios/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: build/ios/MyLLM.ipa
