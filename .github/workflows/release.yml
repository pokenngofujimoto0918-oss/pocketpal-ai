name: Release Workflow (Hacker Route)

on:
  workflow_dispatch: # 手動実行用

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm install
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          xcodebuild -workspace ios/MyLLM.xcworkspace \
            -scheme MyLLM \
            -configuration Release \
            -archivePath ios/MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p build/ios
          mv ios/MyLLM.xcarchive/Products/Applications/MyLLM.app build/ios/
          # SideStore用には.appをフォルダに入れてzip/ipa化する処理
          cd build/ios
          mkdir Payload
          cp -r MyLLM.app Payload/
          zip -r MyLLM.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: build/ios/MyLLM.ipa
