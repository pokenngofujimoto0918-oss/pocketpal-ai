name: Release Workflow (Ultimate Local Mode)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      - name: 🚨 The Firebase Eradicator v2 (Fix Build Error)
        run: |
          echo "🔥 1. Preventing iOS Native Auto-linking..."
          node -e "
            const fs = require('fs');
            let config = {};
            if (fs.existsSync('react-native.config.js')) {
              try { config = require('./react-native.config.js'); } catch(e) {}
            }
            config.dependencies = config.dependencies || {};
            ['app', 'app-check', 'analytics'].forEach(mod => {
              config.dependencies[\`@react-native-firebase/\${mod}\`] = { platforms: { ios: null, android: null } };
            });
            fs.writeFileSync('react-native.config.js', 'module.exports = ' + JSON.stringify(config, null, 2) + ';');
          "
          
          echo "🔥 2. iOS Native: Purging Firebase from AppDelegate completely..."
          # AppDelegate.swift から import を物理的に行ごと削除（これが今回のビルドエラーの特効薬）
          sed -i '' '/import RNFBAppCheck/d' ios/PocketPal/AppDelegate.swift || true
          sed -i '' '/import Firebase/d' ios/PocketPal/AppDelegate.swift || true
          # 初期化コードも無効化
          sed -i '' 's/RNFBAppCheckModule.sharedInstance()/\/\/ RNFBAppCheckModule.sharedInstance()/g' ios/PocketPal/AppDelegate.swift || true
          sed -i '' 's/FirebaseApp.configure()/\/\/ FirebaseApp.configure()/g' ios/PocketPal/AppDelegate.swift || true
          
          echo "🔥 3. JS: Mocking Firebase to prevent JS panic..."
          cat << 'EOF' > proxy-mock.js
          const universalMock = new Proxy(() => universalMock, {
            get: (target, prop) => {
              if (prop === 'then') return undefined;
              return universalMock;
            },
            apply: () => universalMock
          });
          module.exports = universalMock;
          EOF
          
          mkdir -p node_modules/@react-native-firebase/app/lib
          mkdir -p node_modules/@react-native-firebase/app-check/lib
          mkdir -p node_modules/@react-native-firebase/analytics/lib
          
          cp proxy-mock.js node_modules/@react-native-firebase/app/lib/index.js
          cp proxy-mock.js node_modules/@react-native-firebase/app-check/lib/index.js
          cp proxy-mock.js node_modules/@react-native-firebase/analytics/lib/index.js

      - name: Install iOS Pods
        run: |
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      - name: Create missing config files
        run: |
          mkdir -p ios/Config
          touch ios/Config/Env.xcconfig
          echo "// Dummy config" > ios/Config/Env.xcconfig

      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;
          
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "Error: Payload is too small ($SIZE_KB KB)."
            exit 1
          fi
          zip -r MyLLM.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
