name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | awk '/Schemes:/{flag=1;next} flag{print;exit}' | xargs)
          
          echo "Found Workspace: $WORKSPACE_PATH"
          echo "Found Scheme: $SCHEME_NAME"

          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ios/MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p build/ios
          # アーカイブの中から .app ファイルを確実に探し出す
          APP_PATH=$(find ios/MyLLM.xcarchive -name "*.app" -type d | head -n 1)
          echo "App found at: $APP_PATH"
          
          # Payloadフォルダを作成してIPA化（SideStore用）
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyLLM.ipa Payload
          mv MyLLM.ipa build/ios/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: build/ios/MyLLM.ipa
