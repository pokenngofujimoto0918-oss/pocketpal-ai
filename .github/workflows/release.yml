name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm' # キャッシュを利用しつつ安定させる

      - name: Install dependencies (Clean & Force)
        run: |
          # 以前の残骸を掃除し、不整合を無視してインストール
          npm install --force --legacy-peer-deps
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          # アプリ名を「MyLLM」に変更していることに合わせたビルド命令
          xcodebuild -workspace ios/pocketpal.xcworkspace \
            -scheme pocketpal \
            -configuration Release \
            -archivePath ios/MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p build/ios
          # 生成された.appを探してPayloadに格納
          APP_PATH=$(find ios/MyLLM.xcarchive -name "*.app")
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyLLM.ipa Payload
          mv MyLLM.ipa build/ios/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: build/ios/MyLLM.ipa
