name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          # 存在する.xcworkspaceを自動で見つける
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          # その中にあるスキーム名を自動で抽出する
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | sed -n '/Schemes:/,$p' | sed -n '2p' | xstrip || echo "pocketpal")
          
          echo "Found Workspace: $WORKSPACE_PATH"
          echo "Found Scheme: $SCHEME_NAME"

          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ios/MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA
        run: |
          mkdir -p build/ios
          APP_PATH=$(find ios/MyLLM.xcarchive -name "*.app")
          mkdir Payload
          cp -r "$APP_PATH" Payload/
          zip -r MyLLM.ipa Payload
          mv MyLLM.ipa build/ios/
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: build/ios/MyLLM.ipa
