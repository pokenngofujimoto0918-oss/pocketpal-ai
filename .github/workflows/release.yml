name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (No Signing)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | awk '/Schemes:/{flag=1;next} flag{print;exit}' | xargs)
          
          # 成果物の場所を ./output に固定する
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ./MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

      - name: Export IPA (Force Catch)
        run: |
          mkdir -p Payload
          # アーカイブ内の Applications 直下にある .app を強制的に Payload へコピー
          cp -r ./MyLLM.xcarchive/Products/Applications/*.app ./Payload/
          
          # コピーが成功したかサイズでチェック（1MB以下なら失敗とみなす）
          APP_SIZE=$(du -sk Payload | cut -f1)
          if [ "$APP_SIZE" -lt 1000 ]; then
            echo "Error: App content is missing! (Size: ${APP_SIZE}KB)"
            exit 1
          fi
          
          zip -r MyLLM.ipa Payload
          
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
