name: Release Workflow (Pacifier Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      - name: Install iOS Pods
        run: |
          # Firebaseも含め、すべて「通常通り」インストールしてパニックを防ぐ
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      - name: Create missing config files
        run: |
          mkdir -p ios/Config
          touch ios/Config/Env.xcconfig
          echo "// Dummy config" > ios/Config/Env.xcconfig
          
          # Xcodeのビルドエラー回避用の「抜け殻plist」
          cat << 'EOF' > ios/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict></dict>
          </plist>
          EOF

      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      - name: 🕊️ The Firebase Pacifier (Peaceful Injection)
        run: |
          echo "🔥 Pacifying Firebase: Injecting dummy options instead of deleting..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            function walk(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              const list = fs.readdirSync(dir);
              list.forEach(file => {
                const fullPath = path.join(dir, file);
                if (fs.statSync(fullPath).isDirectory()) {
                  results = results.concat(walk(fullPath));
                } else if (file === 'AppDelegate.swift') {
                  results.push(fullPath);
                }
              });
              return results;
            }
            const files = walk('./ios/PocketPal');
            files.forEach(file => {
              let content = fs.readFileSync(file, 'utf8');
              
              // FirebaseApp.configure() を、ダミーのオプションを使った安全な初期化にすり替える
              const dummyInit = [
                'let dummyOptions = FirebaseOptions(googleAppID: \"1:1234567890:ios:abcdef123456\", gcmSenderID: \"1234567890\")',
                'dummyOptions.projectID = \"dummy-project\"',
                'dummyOptions.apiKey = \"dummy_api_key_1234567890\"',
                'dummyOptions.clientID = \"dummy.apps.googleusercontent.com\"',
                'FirebaseApp.configure(options: dummyOptions)'
              ].join('\n');
              
              content = content.replace(/FirebaseApp\.configure\(\)/g, dummyInit);
              fs.writeFileSync(file, content);
              console.log('✅ Pacified: ' + file);
            });
          "

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;
          
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "❌ Error: Payload is too small ($SIZE_KB KB). Build likely failed."
            exit 1
          fi
          zip -r MyLLM.ipa Payload
          echo "✅ IPA created successfully (${SIZE_KB} KB)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
