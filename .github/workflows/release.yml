name: Release Workflow (Absolute Local Mode)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install JS dependencies (Yarn)
        run: |
          corepack enable
          yarn install --network-timeout 1000000

      - name: 🚨 The Absolute Eradicator v5 (Nuke BEFORE Pods)
        run: |
          echo "🔥 1. JS: Nuke and Replace Firebase NPM packages (deep)..."
          DUMMY_INDEX='const m = new Proxy(function(){return m;},{get:function(t,p){if(p==="then")return undefined;if(p==="default")return m;return m;}}); module.exports = m;'
          DUMMY_PKG='{"name":"dummy","version":"99.0.0","main":"index.js","react-native":"index.js","browser":"index.js"}'
          
          if [ -d "node_modules/@react-native-firebase" ]; then
            find node_modules/@react-native-firebase -mindepth 1 -maxdepth 1 -type d | while read pkg_dir; do
              echo "Nuking $pkg_dir"
              rm -rf "$pkg_dir"/*
              echo "$DUMMY_PKG" > "$pkg_dir/package.json"
              echo "$DUMMY_INDEX" > "$pkg_dir/index.js"
              for subdir in lib src commonjs dist; do
                mkdir -p "$pkg_dir/$subdir"
                echo "$DUMMY_INDEX" > "$pkg_dir/$subdir/index.js"
                echo "$DUMMY_INDEX" > "$pkg_dir/$subdir/index.native.js"
              done
            done
          fi

          echo "🔥 2. Preventing iOS Native Auto-linking..."
          node -e "
            const fs = require('fs');
            const MODULES = ['app', 'app-check', 'analytics', 'crashlytics', 'perf'];
            let raw = '{}';
            if (fs.existsSync('react-native.config.js')) {
              raw = fs.readFileSync('react-native.config.js', 'utf8').replace(/^\s*module\.exports\s*=\s*/, '').replace(/;?\s*$/, '');
            }
            let config = {};
            try { config = eval('(' + raw + ')'); } catch(e) { config = {}; }
            config.dependencies = config.dependencies || {};
            MODULES.forEach(mod => {
              config.dependencies[\`@react-native-firebase/\${mod}\`] = { platforms: { ios: null, android: null } };
            });
            fs.writeFileSync('react-native.config.js', 'module.exports = ' + JSON.stringify(config, null, 2) + ';');
          "
          
          echo "🔥 3. iOS Native: Purging Firebase from AppDelegate..."
          node -e "
            const fs = require('fs');
            const path = require('path');
            function walk(dir) {
              let results = [];
              if (!fs.existsSync(dir)) return results;
              const list = fs.readdirSync(dir);
              list.forEach(file => {
                const fullPath = path.join(dir, file);
                if (fs.statSync(fullPath).isDirectory()) {
                  results = results.concat(walk(fullPath));
                } else if (/AppDelegate\.(m|mm|swift)$/.test(file)) {
                  results.push(fullPath);
                }
              });
              return results;
            }
            const files = walk('./ios/PocketPal');
            files.forEach(file => {
              let content = fs.readFileSync(file, 'utf8');
              content = content.replace(/^.*import\s+RNFBAppCheck.*$/gm, '');
              content = content.replace(/^.*import\s+Firebase.*$/gm, '');
              content = content.replace(/^.*#import\s+[<\"]Firebase.*[>\"].*$/gm, '');
              content = content.replace(/^.*#import\s+[<\"]RNFBAppCheck.*[>\"].*$/gm, '');
              content = content.replace(/FirebaseApp\.configure\(\)/g, '// FirebaseApp.configure()');
              content = content.replace(/\[FIRApp configure\];?/g, '// [FIRApp configure]');
              content = content.replace(/\[RNFBAppCheckModule\s+sharedInstance\];?/g, '// [RNFBAppCheckModule sharedInstance]');
              content = content.replace(/RNFBAppCheckModule\.sharedInstance\(\)/g, '// RNFBAppCheckModule.sharedInstance()');
              fs.writeFileSync(file, content);
            });
          "

      - name: Install iOS Pods (Now 100% clean and Firebase-free)
        run: |
          cd ios && pod install && cd ..

      - name: Fix Node Path for Xcode
        run: |
          sudo ln -s $(which node) /usr/local/bin/node || true
          sudo ln -s $(which yarn) /usr/local/bin/yarn || true

      - name: Create missing config files
        run: |
          mkdir -p ios/Config
          touch ios/Config/Env.xcconfig
          echo "// Dummy config" > ios/Config/Env.xcconfig
          
          cat << 'EOF' > ios/GoogleService-Info.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict></dict>
          </plist>
          EOF

      - name: Enable iTunes File Sharing
        run: |
          PLIST_PATH=$(find ios -maxdepth 2 -name "Info.plist" | grep -v "Tests" | head -n 1)
          /usr/libexec/PlistBuddy -c "Add :UIFileSharingEnabled bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :UIFileSharingEnabled bool true" "$PLIST_PATH"
          /usr/libexec/PlistBuddy -c "Add :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH" || /usr/libexec/PlistBuddy -c "Set :LSSupportsOpeningDocumentsInPlace bool true" "$PLIST_PATH"

      - name: Build iOS App
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme PocketPal \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            EXCLUDED_ARCHS="x86_64"

      - name: Export IPA
        run: |
          mkdir -p Payload
          find ./build_output -name "*.app" -type d -exec cp -R {} Payload/ \;
          
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "❌ Error: Payload is too small ($SIZE_KB KB). Build likely failed."
            exit 1
          fi
          zip -r MyLLM.ipa Payload
          echo "✅ IPA created successfully (${SIZE_KB} KB)"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
