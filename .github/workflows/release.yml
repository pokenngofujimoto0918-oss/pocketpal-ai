name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build iOS App (Raw Build Method)
        run: |
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | awk '/Schemes:/{flag=1;next} flag{print;exit}' | xargs)
          
          # archiveではなく通常の「build」を実行し、出力先を ./build_output に強制指定する
          xcodebuild build \
            -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath ./build_output \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      - name: Export IPA
        run: |
          mkdir -p Payload
          
          # build_output 内の Release-iphoneos フォルダに生身の .app が生成されるので、それをコピー
          find ./build_output/Build/Products/Release-iphoneos -name "*.app" -type d -exec cp -R {} Payload/ \;
          
          # 中身のサイズ確認
          echo "Checking Payload size..."
          du -sh Payload/
          
          # もし中身が1MB未満（空箱）なら、緑のチェックをつけずにエラーで止める安全装置
          SIZE_KB=$(du -sk Payload | cut -f1)
          if [ "$SIZE_KB" -lt 1000 ]; then
            echo "Error: Payload is too small ($SIZE_KB KB). App file is missing!"
            exit 1
          fi
          
          # IPAとしてパッキング
          zip -r MyLLM.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
