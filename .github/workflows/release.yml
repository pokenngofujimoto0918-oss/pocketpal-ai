name: Release Workflow (Hacker Route)

on:
  workflow_dispatch:

jobs:
  build_ios:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies (Yarn Strategy)
        run: |
          corepack enable
          yarn install --network-timeout 1000000
          cd ios && pod install && cd ..

      - name: Build and Force Export
        run: |
          # 1. 設計図の自動特定
          WORKSPACE_PATH=$(find ios -name "*.xcworkspace" | head -n 1)
          SCHEME_NAME=$(xcodebuild -workspace "$WORKSPACE_PATH" -list | awk '/Schemes:/{flag=1;next} flag{print;exit}' | xargs)
          
          # 2. ビルド（アーカイブ作成）
          xcodebuild -workspace "$WORKSPACE_PATH" \
            -scheme "$SCHEME_NAME" \
            -configuration Release \
            -archivePath ./MyLLM.xcarchive \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_STYLE=Manual \
            clean archive

          # 3. 【最重要】アーカイブの中から「.app」フォルダを力技で見つける
          mkdir -p Payload
          # 構造を無視して「.app」で終わるフォルダを探し、Payloadへコピー
          find ./MyLLM.xcarchive -name "*.app" -type d -print0 | xargs -0 -I {} cp -R "{}" Payload/
          
          # 4. 中身が空でないかサイズを表示（ここが0Bなら失敗）
          echo "Checking Payload size..."
          du -sh Payload/
          
          # 5. IPA作成
          zip -r MyLLM.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyLLM-IPA
          path: MyLLM.ipa
